<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer PXG - Terror</title>
    <style>
        body{font-family:Arial,sans-serif;background:#f0f2f5;color:#333;max-width:1000px;margin:0 auto;padding:20px}
        .controls-container,.timer-card{background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
        .controls-container{margin-bottom:20px}
        .form-row,.presets-section,.global-actions{display:flex;flex-wrap:wrap;gap:15px;align-items:flex-end}
        .form-group{display:flex;flex-direction:column}
        .form-group label,.presets-label{font-size:14px;font-weight:bold;margin-bottom:5px;color:#555}
        input,select{padding:10px;font-size:14px;border:1px solid #ccc;border-radius:4px;background:#fff}
        input[type="text"]{width:180px} input[type="number"]{width:120px} select{width:180px} #voiceInput{width:250px}
        button{padding:10px 20px;font-size:15px;font-weight:bold;color:#fff;border:none;border-radius:4px;cursor:pointer;transition:all .2s}
        .btn-add{background:#007bff;height:40px} .btn-add:hover{background:#0056b3}
        .btn-test{background:#17a2b8;height:40px;padding:10px;font-size:13px} .btn-test:hover{background:#138496}
        .presets-section,.global-actions{margin-top:15px;padding-top:15px;border-top:1px solid #eee;align-items:center}
        
        /* Botões de Preset */
        .btn-riza{background:#ff4757} .btn-riza:hover{background:#ff6b81}
        .btn-gama{background:#2ed573;color:#111} .btn-gama:hover{background:#7bed9f}
        .btn-kaikiri{background:#f39c12} .btn-kaikiri:hover{background:#e67e22} 
        .btn-ptera{background:#6c757d} .btn-ptera:hover{background:#5a6268} /* Novo Preset Ptera (Cinza) */

        .btn-start-all{background:#28a745;margin-right:10px} .btn-start-all:hover{background:#218838}
        .btn-pause-all{background:#ffc107;color:#212529} .btn-pause-all:hover{background:#e0a800}
        .timers-container{display:flex;flex-wrap:wrap;gap:15px;margin-top:20px}
        .timer-card{width:220px;text-align:center;border-top:4px solid #007bff;display:flex;flex-direction:column;transition:all .3s}
        
        /* Cabeçalho do Timer */
        .timer-header{display:flex;justify-content:center;align-items:center;gap:8px;margin-bottom:5px}
        .timer-title{font-size:16px;font-weight:bold;color:#444;word-wrap:break-word;margin:0}
        
        .timer-info{font-size:11px;color:#666;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .timer-display{font-size:36px;font-weight:bold;margin:15px 0;color:#111}
        .timer-status{font-size:12px;margin-bottom:10px;color:#28a745;font-weight:bold;flex-grow:1}
        .timer-card.paused{border-top-color:#ffc107} .timer-card.paused .timer-status{color:#866500}
        .timer-card.warning{background:#dc3545;color:#fff;border-top-color:#b21f2d;animation:pulse 1s infinite}
        .timer-card.warning .timer-title,.timer-card.warning .timer-info,.timer-card.warning .timer-display,.timer-card.warning .timer-status{color:#fff}
        .card-controls{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid #eee}
        .timer-card.warning .card-controls{border-top-color:rgba(255,255,255,.3)}
        .play-pause-group{display:flex;gap:8px}
        .icon-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:#f0f2f5;color:#333;font-size:14px;padding:0;border:none;cursor:pointer;transition:all .2s}
        
        .btn-edit{width:26px; height:26px; font-size:12px; color:#007bff; background:#e9ecef} 
        .btn-edit:hover{background:#007bff; color:#fff}
        
        .btn-play{color:#28a745} .btn-play:hover{background:#28a745;color:#fff}
        .btn-pause{color:#e0a800} .btn-pause:hover{background:#ffc107;color:#212529}
        .btn-reset{color:#17a2b8} .btn-reset:hover{background:#17a2b8;color:#fff}
        .btn-delete{color:#dc3545} .btn-delete:hover{background:#dc3545;color:#fff}
        
        /* Modal de Edição */
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;z-index:1000}
        .modal-box{background:#fff;padding:20px;border-radius:8px;width:320px;box-shadow:0 4px 15px rgba(0,0,0,0.2)}
        .modal-box h3{margin-top:0;color:#333;margin-bottom:15px}
        .modal-btns{display:flex;justify-content:flex-end;gap:10px;margin-top:15px}
        .btn-save{background-color:#28a745} .btn-save:hover{background-color:#218838}
        .btn-cancel{background-color:#6c757d} .btn-cancel:hover{background-color:#5a6268}
        
        @keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
    </style>
</head>
<body>

    <div id="editModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Editar Timer</h3>
            <div class="form-group">
                <label>Nome do Timer:</label>
                <input type="text" id="edit-name" style="width:100%; box-sizing:border-box;" onkeypress="if(event.key==='Enter') saveEdit()">
            </div>
            <div class="form-group" style="margin-top:10px;">
                <label>Voz da Contagem:</label>
                <select id="edit-voice" style="width:100%; box-sizing:border-box;"></select>
            </div>
            <input type="hidden" id="edit-id">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="$('editModal').style.display='none'">Cancelar</button>
                <button class="btn-save" onclick="saveEdit()">Salvar</button>
            </div>
        </div>
    </div>

    <div class="controls-container">
        <h2>Timer PXG - Terror</h2>
        
        <div class="form-row">
            <div class="form-group">
                <label for="timerNameInput">Nome:</label>
                <input type="text" id="timerNameInput" placeholder="Nome do timer">
            </div>

            <div class="form-group">
                <label for="timerInput">Tempo (segundos):</label>
                <input type="number" id="timerInput" placeholder="Ex: 25" min="1">
            </div>

            <div class="form-group">
                <label for="soundInput">Som de Alerta Final:</label>
                <select id="soundInput">
                    <option value="padrao">Bipe Padrão</option>
                    <option value="agudo">Alarme Agudo</option>
                    <option value="grave">Tom Grave</option>
                    <option value="sirene">Sirene Rápida</option>
                    <option value="duplo">Bipe Duplo</option>
                    <option value="retro">Som Retrô/Arcade</option>
                    <option value="sonar">Sonar (Eco longo)</option>
                    <option value="pulso">Pulso de Alerta</option>
                </select>
            </div>

            <div class="form-group">
                <label for="voiceInput">Voz da Contagem:</label>
                <div style="display: flex; gap: 5px;">
                    <select id="voiceInput">
                        <option value="nenhuma">Nenhuma (Apenas Bipes)</option>
                    </select>
                    <button type="button" class="btn-test" onclick="testV()">🔊 Testar</button>
                </div>
            </div>

            <button class="btn-add" onclick="addT()">+ Adicionar</button>
        </div>

        <div class="presets-section">
            <div class="presets-label">Presets Rápidos:</div>
            <button class="btn-gama" onclick="loadP('gama')">🌿 Gama</button>
            <button class="btn-riza" onclick="loadP('riza')">🔥 Riza</button>
            <button class="btn-kaikiri" onclick="loadP('kaikiri')">👊 Kaikiri</button>
            <button class="btn-ptera" onclick="loadP('ptera')">🪨 Ptera</button>
        </div>

        <div class="global-actions">
            <button class="btn-start-all" onclick="startAll()">➔ Sincronizar e Iniciar Todos</button>
            <button class="btn-pause-all" onclick="pauseAll()">❚❚ Pausar Todos</button>
        </div>
    </div>

    <div class="timers-container" id="timersContainer"></div>

    <script>
        const $ = id => document.getElementById(id);
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const synth = window.speechSynthesis;
        let timerCount = 0, activeTimers = {}, vozes = [], testTo;

        const sounds = {
            padrao: {t:'sine', f:440, n:"Bipe Padrão"}, agudo: {t:'square', f:880, n:"Alarme Agudo"},
            grave: {t:'triangle', f:220, n:"Tom Grave"}, sirene: {t:'sawtooth', f:600, n:"Sirene Rápida"},
            duplo: {t:'sine', f:660, n:"Bipe Duplo"}, retro: {t:'square', f:200, n:"Som Retrô"},
            sonar: {t:'sine', f:900, n:"Sonar (Eco)"}, pulso: {t:'sawtooth', f:400, n:"Pulso"}
        };

        function loadV() {
            vozes = synth.getVoices().filter(v => v.lang.toLowerCase().includes('pt'));
            const sel = $('voiceInput'), val = sel.value;
            sel.innerHTML = '<option value="nenhuma">Nenhuma (Apenas Bipes)</option>';
            vozes.forEach(v => sel.add(new Option(v.name, v.name)));
            if(val) sel.value = val;
        }
        if(synth) { loadV(); synth.onvoiceschanged = loadV; }

        function falar(txt, vName, cb) {
            if(!synth) return;
            synth.cancel();
            let u = new SpeechSynthesisUtterance(txt), voz = vozes.find(v => v.name === vName);
            if(voz) u.voice = voz;
            if(cb) u.onend = cb;
            synth.speak(u);
        }

        function playS(type, isW = false) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(), g = audioCtx.createGain(), s = sounds[type] || sounds.padrao, t = audioCtx.currentTime;
            osc.connect(g); g.connect(audioCtx.destination);
            
            if(isW) {
                osc.type = s.t; osc.frequency.value = s.f * 1.2;
                osc.start(t); g.gain.exponentialRampToValueAtTime(0.00001, t + 0.1); osc.stop(t + 0.1);
                return;
            }
            
            osc.start(t); osc.type = s.t; osc.frequency.value = s.f;
            if(type === 'duplo') {
                [0,0.15,0.3].forEach(x => g.gain.setValueAtTime(x===0.15?0:1, t+x));
                g.gain.exponentialRampToValueAtTime(0.00001, t+0.6); osc.stop(t+0.6);
            } else if(type === 'retro') {
                osc.frequency.exponentialRampToValueAtTime(900, t+0.4);
                g.gain.exponentialRampToValueAtTime(0.00001, t+0.5); osc.stop(t+0.5);
            } else if(type === 'sonar') {
                g.gain.exponentialRampToValueAtTime(0.00001, t+1.5); osc.stop(t+1.5);
            } else if(type === 'pulso') {
                for(let i=0; i<4; i++) { g.gain.setValueAtTime(1, t+i*0.15); g.gain.setValueAtTime(0.00001, t+i*0.15+0.1); }
                osc.stop(t+0.6);
            } else {
                g.gain.exponentialRampToValueAtTime(0.00001, t+0.8); osc.stop(t+0.8);
            }
        }

        function testV() {
            const v = $('voiceInput').value, n = $('timerNameInput').value.trim(), s = $('soundInput').value;
            if(synth) synth.cancel(); clearTimeout(testTo);
            if(v === 'nenhuma') {
                playS(s, true); testTo = setTimeout(() => playS(s), 800);
            } else if(n) {
                falar(n, v, () => testTo = setTimeout(() => falar("5, 4, 3, 2, 1", v), 1500));
            } else falar("5, 4, 3, 2, 1", v);
        }

        function createT(n, dur, sType, vName) {
            if(dur <= 8) return alert(`Tempo do timer "${n}" deve ser > 8s.`);
            const id = timerCount++;
            n = n || `Timer ${id+1}`;
            const vEx = vName === 'nenhuma' ? 'Apenas Bipes' : vName.replace(/Microsoft | Online \(Natural\) - Portuguese \(Brazil\)/g, "");

            $('timersContainer').insertAdjacentHTML('beforeend', `
                <div class="timer-card paused" id="tc-${id}">
                    <div class="timer-header">
                        <div class="timer-title" id="tt-${id}">${n}</div>
                        <button class="icon-btn btn-edit" onclick="openEdit(${id})" title="Editar">✏️</button>
                    </div>
                    <div class="timer-info">Loop: ${dur}s | 🔊 ${sounds[sType].n}</div>
                    <div class="timer-info" id="tv-${id}">🗣️ Voz: ${vEx}</div>
                    <div class="timer-display" id="td-${id}">${dur}s</div>
                    <div class="timer-status" id="ts-${id}">Aguardando Inicialização</div>
                    <div class="card-controls">
                        <div class="play-pause-group">
                            <button class="icon-btn btn-play" onclick="startT(${id})" title="Iniciar">▶</button>
                            <button class="icon-btn btn-pause" onclick="pauseT(${id})" title="Pausar">❚❚</button>
                            <button class="icon-btn btn-reset" onclick="resetT(${id})" title="Reiniciar">🔄</button>
                        </div>
                        <button class="icon-btn btn-delete" onclick="remT(${id})" title="Remover">🗑️</button>
                    </div>
                </div>`);
            activeTimers[id] = { n, d: dur, tl: dur, s: sType, v: vName, int: null, run: false };
        }

        function addT() {
            const d = parseInt($('timerInput').value);
            if(isNaN(d) || d<=0) return alert("Insira um tempo válido em segundos.");
            createT($('timerNameInput').value.trim(), d, $('soundInput').value, $('voiceInput').value);
            $('timerInput').value = $('timerNameInput').value = ''; $('timerNameInput').focus();
        }

        function remAll() {
            Object.values(activeTimers).forEach(t => clearInterval(t.int));
            activeTimers = {}; timerCount = 0; $('timersContainer').innerHTML = '';
        }

        function loadP(type) {
            if(Object.keys(activeTimers).length && !confirm("⚠️ Isso apagará os timers atuais. Continuar?")) return;
            remAll();
            const v = $('voiceInput').value;
            if(type === 'riza') { 
                createT("Fire Ball", 25, "agudo", v); 
                createT("Chuva", 90, "sonar", v); 
            }
            else if (type === 'gama') { 
                createT("Cura", 90, "pulso", v); 
                createT("Solar Beam", 50, "duplo", v); 
            }
            else if (type === 'kaikiri') {
                createT("Fecha Mão (Reflect)", 20, "retro", v);
                createT("Reta (Cima/Baixo)", 35, "duplo", v);
                createT("Dynamic Punch (meio)", 40, "agudo", v);
            }
            else if (type === 'ptera') {
                createT("Fly", 50, "sonar", v);
                createT("Beam", 20, "duplo", v);
                createT("Ancient Power", 25, "agudo", v);
                createT("Corte Costas", 15, "retro", v);
                createT("Chuva de pedra", 60, "sirene", v);
            }
        }

        function updC(id, cls, txt) {
            $('tc-'+id).className = 'timer-card ' + cls;
            $('ts-'+id).innerText = txt;
            $('td-'+id).innerText = activeTimers[id].tl + 's';
        }

        function startT(id) {
            const t = activeTimers[id];
            if(!t || t.run) return;
            if(audioCtx.state === 'suspended') audioCtx.resume();
            if(synth) synth.speak(new SpeechSynthesisUtterance(''));
            t.run = true;
            updC(id, $('tc-'+id).classList.contains('warning') ? 'warning' : '', $('tc-'+id).classList.contains('warning') ? 'Aviso Final!' : 'Executando...');
            t.int = setInterval(() => tick(id), 1000);
        }

        function pauseT(id) {
            const t = activeTimers[id];
            if(!t || !t.run) return;
            clearInterval(t.int); t.run = false;
            updC(id, $('tc-'+id).classList.contains('warning') ? 'warning' : 'paused', $('tc-'+id).classList.contains('warning') ? 'Aviso Final (Pausado)' : 'Pausado');
        }

        function resetT(id) {
            const t = activeTimers[id];
            if(!t) return;
            t.tl = t.d; 
            if(synth) synth.cancel(); 
            updC(id, t.run ? '' : 'paused', t.run ? 'Executando...' : 'Pausado');
        }

        function openEdit(id) {
            const t = activeTimers[id];
            if(!t) return;
            $('edit-id').value = id;
            $('edit-name').value = t.n;
            
            const sel = $('edit-voice');
            sel.innerHTML = '<option value="nenhuma">Nenhuma (Apenas Bipes)</option>';
            vozes.forEach(v => sel.add(new Option(v.name, v.name)));
            sel.value = t.v;
            
            $('editModal').style.display = 'flex';
            $('edit-name').focus();
        }

        function saveEdit() {
            const id = $('edit-id').value;
            const t = activeTimers[id];
            if(!t) return;
            
            t.n = $('edit-name').value.trim() || `Timer ${parseInt(id)+1}`;
            t.v = $('edit-voice').value;
            
            $('tt-'+id).innerText = t.n;
            const vEx = t.v === 'nenhuma' ? 'Apenas Bipes' : t.v.replace(/Microsoft | Online \(Natural\) - Portuguese \(Brazil\)/g, "");
            $('tv-'+id).innerText = '🗣️ Voz: ' + vEx;
            
            $('editModal').style.display = 'none';
        }

        function tick(id) {
            const t = activeTimers[id];
            if(!t || !t.run) return;
            t.tl--;
            const w = t.tl <= 8 && t.tl > 0;
            updC(id, w ? 'warning' : '', w ? 'Aviso Final!' : 'Executando...');

            if(w) {
                if(t.v !== 'nenhuma') {
                    if(t.tl === 8) falar(t.n, t.v); else if(t.tl <= 5) falar(t.tl.toString(), t.v);
                } else if(t.tl <= 5) playS(t.s, true);
            } else if(t.tl <= 0) {
                playS(t.s); t.tl = t.d; updC(id, '', 'Executando...');
            }
        }

        function startAll() {
            if(!Object.keys(activeTimers).length) return alert("Adicione um timer.");
            if(audioCtx.state === 'suspended') audioCtx.resume();
            if(synth) synth.speak(new SpeechSynthesisUtterance(''));
            for(let id in activeTimers) {
                clearInterval(activeTimers[id].int);
                activeTimers[id].tl = activeTimers[id].d;
                activeTimers[id].run = false;
                startT(id);
            }
        }

        function pauseAll() {
            for(let id in activeTimers) pauseT(id);
            if(synth) synth.cancel(); clearTimeout(testTo);
        }

        function remT(id) {
            if(activeTimers[id]) { clearInterval(activeTimers[id].int); delete activeTimers[id]; }
            if($('tc-'+id)) $('tc-'+id).remove();
        }
    </script>
</body>
</html>
